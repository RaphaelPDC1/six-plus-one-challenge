  <text x="256" y="318" text-anchor="middle" fill="#FFF4C7" font-family="Arial Black, Inter, Impact, system-ui, sans-serif" font-size="34" font-weight="900" letter-spacing="8" filter="url(#glow)">FOUR LIVES</text>
