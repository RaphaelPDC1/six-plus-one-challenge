<!DOCTYPE html>
<html>
<head>
  <title>Test Logo from Preview Server</title>
  <style>
    body { font-family: monospace; padding: 20px; background: #0d0d0d; color: white; }
    .test { margin: 20px 0; padding: 10px; background: #1a1a1a; border: 1px solid #333; }
    img { max-width: 200px; border: 2px solid #C8A96E; display: block; margin: 10px 0; }
    .status { margin-top: 10px; font-weight: bold; }
  </style>
</head>
<body>
  <h1>Logo Load Test (From Preview Server)</h1>
  
  <div class="test">
    <h2>Test: Relative path</h2>
    <img id="test-logo" src="/manus-storage/six-plus-one-brand-logo-white-strong_2665284a.png" alt="Logo">
    <div class="status" id="status">Loading...</div>
    <div id="debug"></div>
  </div>
  
  <script>
    const img = document.getElementById('test-logo');
    const status = document.getElementById('status');
    const debug = document.getElementById('debug');
    
    console.log('Current URL:', window.location.href);
    console.log('Image src:', img.src);
    
    img.onload = () => {
      status.textContent = '✓ Loaded successfully';
      status.style.color = '#2ECC71';
      debug.textContent = 'Image loaded from: ' + img.currentSrc;
    };
    
    img.onerror = (e) => {
      status.textContent = '✗ Failed to load';
      status.style.color = '#C0392B';
      debug.textContent = 'Error loading from: ' + img.src + ' | Error: ' + (e.message || 'unknown');
    };
  </script>
</body>
</html>
