<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 220" role="img" aria-labelledby="title desc">
  <title id="title">6+1 Four Lives Challenge</title>
  <desc id="desc">High contrast gold, white, and red 6+1 Four Lives Challenge wordmark.</desc>
  <defs>
    <linearGradient id="gold" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#FFF1B8"/>
      <stop offset="0.45" stop-color="#D9B766"/>
      <stop offset="1" stop-color="#A77A27"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-35%" width="140%" height="170%">
      <feDropShadow dx="0" dy="0" stdDeviation="2.5" flood-color="#FFF2BF" flood-opacity="0.72"/>
      <feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#C8A96E" flood-opacity="0.34"/>
    </filter>
  </defs>
  <rect x="6" y="6" width="628" height="208" rx="8" fill="#050505"/>
  <rect x="19" y="19" width="602" height="182" rx="5" fill="none" stroke="#E6C36A" stroke-width="5"/>
  <rect x="34" y="34" width="572" height="152" rx="3" fill="none" stroke="#FFF0B8" stroke-width="2" opacity="0.62"/>
  <text x="320" y="111" text-anchor="middle" fill="#FFFFFF" stroke="#F2D37C" stroke-width="2.5" paint-order="stroke fill" font-family="Arial Black, Inter, Impact, system-ui, sans-serif" font-size="98" font-weight="900" letter-spacing="-7" filter="url(#glow)">6<tspan fill="url(#gold)" stroke="#FFFFFF" stroke-width="1.4">+</tspan>1</text>
  <text x="320" y="157" text-anchor="middle" fill="#FFF4C7" font-family="Arial Black, Inter, Impact, system-ui, sans-serif" font-size="26" font-weight="900" letter-spacing="8" filter="url(#glow)">FOUR LIVES CHALLENGE</text>
  <g fill="#D83A2E" stroke="#FFB0A8" stroke-width="1.5">
    <rect x="207" y="173" width="48" height="12"/>
    <rect x="268" y="173" width="48" height="12"/>
    <rect x="329" y="173" width="48" height="12"/>
    <rect x="390" y="173" width="48" height="12"/>
  </g>
</svg>
